                - blockquote [ref=e701]:
                  - generic [ref=e702]: "“De Anthbot Genie 800 is een verrassend complete robotmaaier zonder begrenzingsdraad. De installatie is eenvoudig en duidelijk, waarbij je het grasveld via Bluetooth inmeet met je telefoon als afstandsbediening. Dat werkt prettig en biedt veel mogelijkheden voor complexe tuinen met meerdere zones. Het maairesultaat is fraai: dankzij de 5 mesjes en het maaien in patronen oogt het gazon strak en verzorgd. De RTK GPS-navigatie maakt nauwkeurig maaien zonder draad mogelijk, mits de antenne goed en stabiel staat. Er zijn ook minpunten. De behuizing fungeert als botssensor, waardoor je hem niet zomaar aan de kap kunt optillen. Ook is de RTK-antenne op een paaltje gevoelig voor harde wind, waardoor de werking kan verstoren. Voor de prijs biedt de Genie 800 veel functionaliteit, vooral voor wie een complex multizone-gazon exact en netjes wil maaien.”"
