                - blockquote [ref=e689]:
                  - generic [ref=e690]: "“De DJI Neo 2 biedt heel veel waar voor zijn geld, en is – zonder controller – zeer regelmatig te vinden voor een vergelijkbare prijs waarvoor ik hem kocht: rond de 160 euro. Hou er wel rekening mee dat een tweede batterij (van 38 euro) geen luxe is, vanwege de korte vliegtijd, maar ook omdat de app relatief snel begint te zeuren bij een leeglopende batterij. De tracking functie is geniaal (wandelen/rennen/fietsen). De drone is supermakkelijk mee te nemen. Dat doe ik ook vaker. Ik betrap mezelf er wel op, dat ik te voorzichtig ben en hem desondanks niet gebruik. Bijvoorbeeld omdat het druk is, of broedseizoen is. Over die drempel zal ik zelf heen moeten stappen. Hieronder vind je een link naar mijn Nederlandstalige mini review op Youtube.”"
