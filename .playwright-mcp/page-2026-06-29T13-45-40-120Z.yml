      - generic [ref=e30]:
        - generic [ref=e32]: Course
        - heading "Valuable Feedback, Fast (for engineers)" [level=2] [ref=e33]
        - paragraph [ref=e34]: Three days of deliberate work on why your test automation does or doesn't deliver — and what to do about it. This isn't a tool tutorial. It covers strategy, risk-based coverage, test design, pipeline thinking, and how to leave with an actual plan rather than just a good feeling. Available in Java, C#, and TypeScript. Best for engineers and testers who are ready to move past "which framework should we use" and start asking better questions.
        - link "View the course" [ref=e35] [cursor=pointer]:
          - /url: https://www.ontestautomation.com/training/valuable-feedback-fast/
          - text: View the course
          - img [ref=e36]
      - generic [ref=e40]:
        - generic [ref=e42]: Course
        - heading "Valuable Feedback, Fast — Applied (for teams)" [level=2] [ref=e43]
        - paragraph [ref=e44]: This one is specifically for teams — meaning it works on your challenges, not a fictional case study. Over two days, you'll map your actual feedback loops, interrogate your test design choices, and figure out together what needs to change. You leave with a shared plan, not a slide deck nobody looks at again. Designed for teams of 6–25 who are ready to have the honest conversations that most teams quietly avoid.
        - link "View the course" [ref=e45] [cursor=pointer]:
          - /url: https://www.ontestautomation.com/training/valuable-feedback-fast-applied/
          - text: View the course
