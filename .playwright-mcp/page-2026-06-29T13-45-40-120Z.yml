        - generic [ref=e22]: Blog post
        - heading "The Test Automation Quadrant" [level=2] [ref=e23]
        - paragraph [ref=e24]: "Not all tests deserve to exist — and this model makes that uncomfortably clear. The Test Automation Quadrant plots every test on two axes: information value and efficiency. The result is a straightforward framework for deciding what to invest in, what to tolerate despite the cost, what to deprioritize, and what to delete without a second thought. Worth a read even if you think your suite is in good shape."
        - link "Read the article" [ref=e25] [cursor=pointer]:
          - /url: https://www.ontestautomation.com/the-test-automation-quadrant/
          - text: Read the article
